name: Build LaTeX PDF

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            Neeraj_Singh_Resume.tex
            Neeraj_Singh_Resume_Security.tex
            Neeraj_Singh_Resume_devops.tex
          working_directory: resumes
          
      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resumes/Neeraj_Singh_Resume.pdf resumes/Neeraj_Singh_Resume_Security.pdf resumes/Neeraj_Singh_Resume_devops.pdf
          git commit -m "Update resumes" || echo "No changes to commit"
          git push
