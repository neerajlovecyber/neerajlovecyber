name: Build LaTeX PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'main.tex'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install LaTeX
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-latex-extra

      - name: Compile PDF
        run: pdflatex -jobname=resume main.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git commit -m "Update resume.pdf" || echo "No changes to commit"
          git push
